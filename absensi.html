<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Barcode - Madrasah Darussalam</title>
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script>
        tailwind.config = { theme: { extend: { colors: { emerald: { 600: '#059669', 700: '#047857', 800: '#065f46' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Poppins', 'sans-serif'] } } } }
    </script>
    
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .id-card-container { width: 54mm; height: 86mm; box-sizing: border-box; border: 1px solid #e2e8f0; border-radius: 6px; position: relative; background-color: white; display: flex; flex-direction: column; align-items: center; overflow: hidden; margin: 0 auto; }
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            @page { size: 215mm 330mm; margin: 10mm; } 
            body { background-color: #fff; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            #idCardGrid { display: flex !important; flex-wrap: wrap !important; gap: 5mm !important; justify-content: flex-start !important; }
            .id-card-container { page-break-inside: avoid; border: 1px solid #000; box-shadow: none !important; margin: 0; }
        }
    </style>
</head>
<body class="text-gray-800 p-4 sm:p-8">

    <div id="loadingScreen" class="fixed inset-0 z-[99] flex flex-col items-center justify-center bg-white/90 backdrop-blur-sm hidden">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-emerald-600 mb-4"></div>
        <h2 id="teksLoading" class="text-xl font-bold text-gray-800 font-heading">Memuat Data...</h2>
    </div>

    <!-- Header & Navigasi -->
    <div class="max-w-5xl mx-auto no-print">
        
        <!-- HEADER BARU: Responsif, Ada Logo, Tombol Icon Saja -->
        <div class="bg-white p-3 sm:p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between gap-3 mb-5 sm:mb-6">
            
            <!-- Kiri: Logo dan Teks -->
            <div class="flex items-center gap-3 sm:gap-4 overflow-hidden">
                <div class="w-10 h-10 sm:w-14 sm:h-14 bg-emerald-50 rounded-full flex items-center justify-center shrink-0 border border-emerald-100 overflow-hidden p-1">
                    <img src="asset/logo.png" alt="Logo" class="w-full h-full object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <i class="fas fa-mosque text-xl sm:text-2xl text-emerald-600 hidden"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <h1 class="text-base sm:text-xl font-heading font-bold text-gray-800 truncate leading-tight">Absensi Digital</h1>
                    <p class="text-[10px] sm:text-sm text-gray-500 mt-0.5 truncate">Madrasah Darussalam</p>
                </div>
            </div>

            <!-- Kanan: Tombol Kembali -->
            <button onclick="window.location.href='index.html'" class="w-10 h-10 sm:w-12 sm:h-12 shrink-0 flex items-center justify-center bg-gray-100 text-gray-600 rounded-xl hover:bg-emerald-100 hover:text-emerald-700 transition-all shadow-sm" title="Kembali ke Beranda">
                <i class="fas fa-arrow-left sm:text-lg"></i>
            </button>
            
        </div>

        <!-- 3 Tab Menu -->
        <div class="flex flex-wrap gap-2 mb-6 bg-white p-2 rounded-2xl shadow-sm border border-gray-100">
            <button onclick="switchTab('scan')" id="tabScan" class="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-bold text-sm transition-all shadow-sm">
                <i class="fas fa-qrcode mr-2"></i> Scanner
            </button>
            <button onclick="switchTab('manual')" id="tabManual" class="flex-1 py-3 text-gray-600 hover:bg-gray-50 rounded-xl font-bold text-sm transition-all">
                <i class="fas fa-list-check mr-2"></i> Manual
            </button>
            <button onclick="switchTab('cetak')" id="tabCetak" class="flex-1 py-3 text-gray-600 hover:bg-gray-50 rounded-xl font-bold text-sm transition-all">
                <i class="fas fa-id-badge mr-2"></i> ID Card
            </button>
        </div>
    </div>

    <!-- AREA 1: SCANNER -->
    <div id="areaScan" class="max-w-md mx-auto no-print">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
            <p class="text-sm text-gray-500 mb-3 font-medium">Arahkan kamera ke Barcode ID Card Santri</p>
            <div id="reader" class="w-full rounded-xl overflow-hidden border-2 border-emerald-100"></div>
            <div id="scanResult" class="mt-4 p-3 bg-emerald-50 border border-emerald-200 rounded-xl text-sm font-bold text-gray-700 hidden">
                <i class="fas fa-check-circle text-emerald-500 mr-1 text-lg"></i>
                <div class="mt-1">Berhasil Discan:</div>
                <div id="nisTerscan" class="text-emerald-700 text-lg font-black tracking-wider"></div>
            </div>
        </div>
    </div>

    <!-- AREA 2: ABSEN MANUAL PER KELAS -->
    <div id="areaManual" class="max-w-4xl mx-auto hidden no-print">
        <div class="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
            <div class="mb-5 bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                <label class="block text-sm font-bold text-emerald-800 mb-2">1. Pilih Kelas Laporan:</label>
                <select id="filterKelasManual" onchange="renderTabelManual()" class="w-full p-3 border border-emerald-300 rounded-xl focus:ring-emerald-500 outline-none text-sm bg-white font-medium text-gray-700">
                    <option value="" disabled selected>-- Silakan Pilih Kelas --</option>
                    <optgroup label="TK"><option value="TK - TK 1">TK 1</option><option value="TK - TK 2">TK 2</option><option value="TK - TK 3">TK 3</option><option value="TK - TK 4">TK 4</option><option value="TK - TK 5">TK 5</option></optgroup>
                    <optgroup label="IBTIDAIYAH"><option value="IBT - Kelas I">Kelas I</option><option value="IBT - Kelas II">Kelas II</option><option value="IBT - Kelas III">Kelas III</option><option value="IBT - Kelas IV">Kelas IV</option><option value="IBT - Kelas V">Kelas V</option><option value="IBT - Kelas VI">Kelas VI</option></optgroup>
                    <optgroup label="SANAWIYAH"><option value="SANA - Kelas 1">Kelas 1</option><option value="SANA - Kelas 2">Kelas 2</option><option value="SANA - Kelas 3">Kelas 3</option></optgroup>
                </select>
            </div>

            <div class="overflow-x-auto rounded-xl border border-gray-200 shadow-sm w-full">
                <table class="w-full text-left border-collapse min-w-max">
                    <thead class="bg-gray-100 text-gray-600 text-xs uppercase border-b border-gray-200">
                        <tr>
                            <th class="p-3 text-center border-r border-gray-200 w-12">No</th>
                            <th class="p-3 border-r border-gray-200 min-w-[200px]">Nama Santri</th>
                            <th class="p-3 text-center border-r border-gray-200 w-40">Status Kehadiran</th>
                            <th class="p-3 text-center w-32">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="bodyTabelManual" class="text-sm divide-y divide-gray-100 bg-white">
                        <tr><td colspan="4" class="p-8 text-center text-gray-400">Silakan pilih kelas terlebih dahulu.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- AREA 3: CETAK ID CARD -->
    <div id="areaCetak" class="max-w-5xl mx-auto hidden">
        <div class="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-gray-100 mb-6 no-print flex flex-col sm:flex-row gap-4 items-center justify-between">
            <div class="w-full sm:w-1/2 relative">
                <i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i>
                <input type="text" id="filterNama" onkeyup="renderIdCards()" placeholder="Cari berdasarkan NIS, Nama, atau Kelas..." class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-emerald-500 outline-none text-sm bg-gray-50 font-medium">
            </div>
            <button onclick="window.print()" class="w-full sm:w-auto px-6 py-3 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 font-bold text-sm transition-all shadow-sm">
                <i class="fas fa-print mr-2"></i> Cetak Kertas F4
            </button>
        </div>
        <div id="idCardGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    </div>

    <!-- ================= SCRIPT UTAMA ================= -->
    <script src="config.js?v=5"></script>
    <script>
	
	const beepSound = new Audio('asset/notif.mp3');
	
        let DATA_SANTRI = [];
        let html5QrcodeScanner;
        let isScanning = false;

        function showLoading(show, teks="Memproses...") { 
            document.getElementById('loadingScreen').style.display = show ? 'flex' : 'none'; 
            document.getElementById('teksLoading').innerText = teks;
        }

        window.onload = () => {
            showLoading(true, "Memuat Data Santri...");
            const formData = new URLSearchParams(); 
            formData.append('action', 'getSantri');
            
            fetch(GAS_URL, { method: 'POST', body: formData }).then(r => r.json()).then(res => {
                showLoading(false);
                if(res.status === 'success') {
                    DATA_SANTRI = res.data;
                    renderIdCards();
                    mulaiScanner(); 
                }
            }).catch(e => { 
                showLoading(false); 
                Swal.fire('Error', 'Gagal memuat data santri.', 'error'); 
            });
        }

        function switchTab(tab) {
            const btnScan = document.getElementById('tabScan');
            const btnManual = document.getElementById('tabManual');
            const btnCetak = document.getElementById('tabCetak');
            const areaScan = document.getElementById('areaScan');
            const areaManual = document.getElementById('areaManual');
            const areaCetak = document.getElementById('areaCetak');

            const classAktif = 'flex-1 py-3 bg-emerald-600 text-white rounded-xl font-bold text-sm shadow-sm transition-all';
            const classMati = 'flex-1 py-3 text-gray-600 hover:bg-gray-50 rounded-xl font-bold text-sm transition-all';

            btnScan.className = classMati; btnManual.className = classMati; btnCetak.className = classMati;
            areaScan.classList.add('hidden'); areaManual.classList.add('hidden'); areaCetak.classList.add('hidden');

            if(tab === 'scan') {
                btnScan.className = classAktif; areaScan.classList.remove('hidden');
                if(html5QrcodeScanner) html5QrcodeScanner.resume();
            } else if (tab === 'manual') {
                btnManual.className = classAktif; areaManual.classList.remove('hidden');
                if(html5QrcodeScanner) html5QrcodeScanner.pause(true);
            } else {
                btnCetak.className = classAktif; areaCetak.classList.remove('hidden');
                if(html5QrcodeScanner) html5QrcodeScanner.pause(true);
            }
        }

        function renderIdCards() {
            const kataKunci = document.getElementById('filterNama').value.toLowerCase();
            const grid = document.getElementById('idCardGrid');
            grid.innerHTML = '';

            const dataTersaring = DATA_SANTRI.filter(s => 
                s.nama.toLowerCase().includes(kataKunci) || 
                s.kelas.toLowerCase().includes(kataKunci) ||
                s.nis.toString().toLowerCase().includes(kataKunci)
            );

            dataTersaring.forEach(s => {
                const cardHtml = `
                <div class="id-card-container shadow-md bg-white">
                    <div class="absolute top-0 left-0 w-full h-[28mm] bg-gradient-to-b from-emerald-800 to-emerald-600 rounded-b-[20px] border-b-[3px] border-amber-400 z-0 shadow-sm"></div>
                    <div class="relative z-10 w-full text-center pt-2.5">
                        <h4 class="text-white text-[11px] font-bold tracking-widest uppercase leading-tight drop-shadow-md">Madrasah<br>Darussalam</h4>
                    </div>
                    <div class="relative z-10 mt-[2mm] bg-white p-0.5 rounded-full shadow-md border-2 border-amber-400">
                        <div class="w-[15mm] h-[15mm] rounded-full flex items-center justify-center bg-white overflow-hidden">
                            <img src="asset/logo.png" alt="Logo" class="w-full h-full object-contain p-0.5" onerror="this.style.display='none'">
                        </div>
                    </div>
                    <div class="relative z-10 text-center w-full px-2 mt-1.5 flex flex-col items-center">
                        <h3 class="font-extrabold text-gray-800 text-[11px] leading-tight uppercase line-clamp-2">${s.nama}</h3>
                        <div class="mt-1 px-3 py-[2px] bg-emerald-50 border border-emerald-200 rounded-full shadow-sm">
                            <p class="text-[7px] text-emerald-700 font-bold uppercase tracking-widest">${s.kelas}</p>
                        </div>
                    </div>
                    <div class="relative z-10 flex-1 w-full flex justify-center items-center mt-0.5 bg-white">
                        <svg class="barcode-svg max-w-full" jsbarcode-format="CODE128" jsbarcode-value="${s.nis}" jsbarcode-height="48" jsbarcode-width="1.6" jsbarcode-displayvalue="true" jsbarcode-fontSize="13" jsbarcode-textmargin="2" jsbarcode-margin="0"></svg>
                    </div>
                    <div class="relative z-10 w-full text-center px-3 mb-[4mm]">
                        <p class="text-[5px] text-gray-500 font-medium leading-tight">Kartu ini jangan sampai hilang.<br>Jika menemukan, mohon kembalikan ke<br><span class="font-bold text-gray-700">Kantor Madrasah Darussalam</span></p>
                    </div>
                    <div class="w-full h-[2.5mm] bg-emerald-800 absolute bottom-0 left-0 border-t border-amber-400"></div>
                </div>`;
                grid.innerHTML += cardHtml;
            });
            JsBarcode(".barcode-svg").init();
        }

        async function mulaiScanner() {
            try {
                html5QrcodeScanner = new Html5Qrcode("reader");
                const cameras = await Html5Qrcode.getCameras();
                if (!cameras || cameras.length === 0) throw new Error("Kamera tidak ditemukan");
                
                let cameraId = cameras[0].id;
                const backCamera = cameras.find(cam => cam.label.toLowerCase().includes("back") || cam.label.toLowerCase().includes("rear"));
                if (backCamera) cameraId = backCamera.id;

                await html5QrcodeScanner.start(
                    cameraId,
                    { fps: 10, qrbox: { width: 250, height: 100 } },
                    onScanSuccess,
                    (err) => { /* Abaikan error parsing */ }
                );
            } catch (err) {
                console.error(err);
                Swal.fire({ icon: 'error', title: 'Kamera Gagal Dibuka', text: err.message });
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
    if(isScanning) return; 
    isScanning = true;
    html5QrcodeScanner.pause(true);

    // Memainkan suara notifikasi sekali saja
    beepSound.play();

    const santri = DATA_SANTRI.find(s => s.nis == decodedText);
    const namaTampil = santri ? santri.nama : "Santri Tidak Dikenal";
    const kelasTampil = santri ? santri.kelas : "-"; 

    simpanAbsenOtomatisScanner(decodedText, namaTampil, kelasTampil);
}

        function simpanAbsenOtomatisScanner(nis, namaTampil, kelasTampil) {
            showLoading(true, "Menyimpan Kehadiran...");
            const fd = new URLSearchParams();
            fd.append('action', 'simpanAbsenBarcode');
            fd.append('nis', nis);
            fd.append('nama', namaTampil);
            fd.append('kelas', kelasTampil);
            fd.append('status', 'Hadir'); 
            fd.append('token', sessionStorage.getItem('tokenMadasa'));

            fetch(GAS_URL, { method: 'POST', body: fd }).then(r=>r.json()).then(res => {
                showLoading(false);
                document.getElementById('scanResult').classList.remove('hidden');
                document.getElementById('nisTerscan').innerText = nis;
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: `${namaTampil} Hadir!`, timer: 2000, showConfirmButton: false });
                setTimeout(() => { isScanning = false; html5QrcodeScanner.resume(); }, 2000);
            }).catch(e => {
                showLoading(false);
                Swal.fire('Error', 'Gagal menyimpan ke database.', 'error');
                setTimeout(() => { isScanning = false; html5QrcodeScanner.resume(); }, 2000);
            });
        }

        function renderTabelManual() {
            const kelas = document.getElementById('filterKelasManual').value;
            const tbody = document.getElementById('bodyTabelManual');
            tbody.innerHTML = '';

            const santriKelas = DATA_SANTRI.filter(s => s.kelas === kelas);

            if (santriKelas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-6 text-center text-red-500 font-bold">Tidak ada santri di kelas ini.</td></tr>';
                return;
            }

            santriKelas.forEach((s, i) => {
                tbody.innerHTML += `
                <tr id="baris_${s.nis}" class="hover:bg-emerald-50 transition-all">
                    <td class="p-3 text-center border-r border-gray-200 text-gray-500 font-medium">${i + 1}</td>
                    <td class="p-3 border-r border-gray-200">
                        <p class="font-bold text-gray-800">${s.nama}</p>
                        <p class="text-[10px] text-gray-500 font-medium mt-0.5">NIS: ${s.nis}</p>
                    </td>
                    <td class="p-3 border-r border-gray-200 text-center">
                        <select id="status_${s.nis}" class="w-full p-2 border border-gray-300 rounded-lg text-sm font-bold outline-none focus:ring-emerald-500 cursor-pointer">
                            <option value="Hadir" class="text-emerald-700">✅ Hadir</option>
                            <option value="Izin" class="text-blue-600">✉️ Izin</option>
                            <option value="Sakit" class="text-orange-500">🤒 Sakit</option>
                            <option value="Alfa" class="text-red-600">❌ Alfa</option>
                        </select>
                    </td>
                    <td class="p-3 text-center">
                        <button onclick="simpanAbsenManual('${s.nis}', '${s.nama}', '${s.kelas}')" class="px-4 py-2 bg-emerald-600 text-white rounded-lg text-xs font-bold hover:bg-emerald-700 transition-all shadow-sm">
                            <i class="fas fa-save mr-1"></i> Simpan
                        </button>
                    </td>
                </tr>`;
            });
        }

        function simpanAbsenManual(nis, namaTampil, kelasTampil) {
            const statusTerpilih = document.getElementById('status_' + nis).value;
            
            showLoading(true, `Menyimpan ${statusTerpilih}...`);
            const fd = new URLSearchParams();
            fd.append('action', 'simpanAbsenBarcode');
            fd.append('nis', nis);
            fd.append('nama', namaTampil);
            fd.append('kelas', kelasTampil);
            fd.append('status', statusTerpilih); 
            fd.append('token', sessionStorage.getItem('tokenMadasa')); 

            fetch(GAS_URL, { method: 'POST', body: fd }).then(r=>r.json()).then(res => {
                showLoading(false);
                if (res.status === 'success') {
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: `${namaTampil} (${statusTerpilih}) Tersimpan!`, timer: 2000, showConfirmButton: false });
                    document.getElementById('baris_' + nis).classList.replace('hover:bg-emerald-50', 'bg-gray-100');
                    document.getElementById('baris_' + nis).classList.add('opacity-70');
                } else {
                    Swal.fire('Error', res.message, 'error');
                }
            }).catch(e => {
                showLoading(false);
                Swal.fire('Error', 'Gagal menyimpan ke database.', 'error');
            });
        }
    </script>
</body>
</html>
