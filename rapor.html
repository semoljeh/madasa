<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Rapor - Madrasah Darussalam</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script>
        tailwind.config = { theme: { extend: { colors: { emerald: { 600: '#059669', 700: '#047857', 800: '#065f46' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Poppins', 'sans-serif'] } } } }
    </script>
    <style> body { -webkit-font-smoothing: antialiased; background-color: #f9fafb; } </style>
</head>
<body class="text-gray-800 p-4 sm:p-8">

    <div id="loadingScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-white/90 backdrop-blur-sm hidden">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-emerald-600"></div>
    </div>

    <div class="max-w-6xl mx-auto mb-6 flex items-center justify-between bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-gray-100">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-emerald-100 text-emerald-700 rounded-xl flex items-center justify-center text-2xl shadow-sm"><i class="fas fa-print"></i></div>
            <div>
                <h1 class="text-xl sm:text-2xl font-heading font-bold text-gray-800">Sistem Cetak Rapor</h1>
                <p class="text-sm text-gray-500">Madrasah Darussalam</p>
            </div>
        </div>
        <button onclick="window.close()" class="px-5 py-2.5 bg-gray-100 hover:bg-red-100 hover:text-red-600 text-gray-700 rounded-xl font-semibold transition-all flex items-center gap-2">
            <i class="fas fa-times"></i> <span class="hidden sm:inline">Tutup Halaman Ini</span>
        </button>
    </div>

    <div class="max-w-6xl mx-auto bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-gray-50 p-4 rounded-xl border border-gray-200">
            <div>
                <label class="block text-xs font-bold text-gray-700 mb-1">1. Pilih Kelas</label>
                <select id="raporKelas" onchange="populateSantriRapor()" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-emerald-500 outline-none text-sm bg-white font-medium">
                    <option value="" disabled selected>-- Pilih Kelas --</option>
                    <optgroup label="TK"><option value="TK - TK 1">TK 1</option><option value="TK - TK 2">TK 2</option><option value="TK - TK 3">TK 3</option><option value="TK - TK 4">TK 4</option><option value="TK - TK 5">TK 5</option></optgroup>
                    <optgroup label="IBTIDAIYAH"><option value="IBT - Kelas I">Kelas I</option><option value="IBT - Kelas II">Kelas II</option><option value="IBT - Kelas III">Kelas III</option><option value="IBT - Kelas IV">Kelas IV</option><option value="IBT - Kelas V">Kelas V</option><option value="IBT - Kelas VI">Kelas VI</option></optgroup>
                    <optgroup label="SANAWIYAH"><option value="SANA - Kelas 1">Kelas 1</option><option value="SANA - Kelas 2">Kelas 2</option><option value="SANA - Kelas 3">Kelas 3</option></optgroup>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-700 mb-1">2. Pilih Santri</label>
                <select id="raporSantri" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-emerald-500 outline-none text-sm bg-white font-medium disabled:bg-gray-100">
                    <option value="" disabled selected>-- Pilih Santri --</option>
                </select>
            </div>
            <div class="flex items-end gap-2">
                <button onclick="previewRapor()" class="w-full py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 shadow-sm font-bold text-sm transition-all"><i class="fas fa-eye mr-1"></i> Buat Rapor</button>
                <button id="btnExportRapor" onclick="exportRaporPDF()" class="w-full py-3 bg-red-600 text-white rounded-xl hover:bg-red-700 shadow-sm font-bold text-sm transition-all hidden"><i class="fas fa-file-pdf mr-1"></i> Cetak PDF</button>
            </div>
        </div>
    </div>

    <div id="wadahKertasRapor" class="hidden max-w-6xl mx-auto flex justify-center overflow-x-auto bg-gray-200 p-4 sm:p-8 rounded-2xl border border-gray-300 shadow-inner">
        <div id="kertasRapor" class="bg-white p-8 sm:p-12 w-full max-w-[210mm] min-h-[330mm] shadow-2xl text-gray-800 text-sm font-sans relative">
            </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzI0bHd62u6ercUlHgSWIzmP381b8smyQdbgehnrbLJvdvIDBSZlr1Gh1ThnKzgjZYZ/exec';
        let GLOBAL_DATA_SANTRI = [];

        function showLoading(show) { document.getElementById('loadingScreen').style.display = show ? 'flex' : 'none'; }

        window.onload = () => {
            showLoading(true);
            const formData = new URLSearchParams(); formData.append('action', 'getSantri');
            fetch(GAS_URL, { method: 'POST', body: formData })
                .then(res => res.json())
                .then(res => {
                    showLoading(false);
                    if(res.status === 'success') GLOBAL_DATA_SANTRI = res.data;
                }).catch(err => { showLoading(false); Swal.fire('Error', 'Gagal memuat data dari server', 'error'); });
        };

        function populateSantriRapor() {
            const kelasPilih = document.getElementById('raporKelas').value;
            const selectSantri = document.getElementById('raporSantri');
            selectSantri.innerHTML = '<option value="" disabled selected>-- Pilih Santri --</option>';
            const santriKelasIni = GLOBAL_DATA_SANTRI.filter(s => s.kelas === kelasPilih);
            santriKelasIni.forEach(s => { selectSantri.innerHTML += `<option value="${s.nis}">${s.nis} - ${s.nama}</option>`; });
            selectSantri.disabled = false;
        }

        // =========================================================
        // KAMUS & LOGIKA KONVERSI
        // =========================================================
        function terbilang(angka) {
            angka = Math.round(angka); const bilangan = ["", "Satu", "Dua", "Tiga", "Empat", "Lima", "Enam", "Tujuh", "Delapan", "Sembilan", "Sepuluh", "Sebelas"];
            if (angka === 0) return "Nol"; if (angka < 12) return bilangan[angka]; if (angka < 20) return terbilang(angka - 10) + " Belas";
            if (angka < 100) return terbilang(Math.floor(angka / 10)) + " Puluh " + (angka % 10 > 0 ? " " + terbilang(angka % 10) : "");
            if (angka === 100) return "Seratus";
            if (angka > 100 && angka < 1000) return terbilang(Math.floor(angka / 100)) + " Ratus " + (angka % 100 > 0 ? terbilang(angka % 100) : "");
            return angka.toString();
        }

        function terbilangArab(angka) {
            if (angka === 0 || isNaN(angka)) return "صفر";
            const satuan = ["", "واحد", "إثنان", "ثلاثة", "أربعة", "خمسة", "ستة", "سبعة", "ثمانية", "تسعة"];
            const belasan = ["عشرة", "أحد عشر", "إثنا عشر", "ثلاثة عشر", "أربعة عشر", "خمسة عشر", "ستة عشر", "سبعة عشر", "ثمانية عشر", "تسعة عشر"];
            const puluhan = ["", "عشرة", "عشرون", "ثلاثون", "أربعون", "خمسون", "ستون", "سبعون", "ثمانون", "تسعون"];
            if (angka < 10) return satuan[angka];
            if (angka >= 10 && angka < 20) return belasan[angka - 10];
            if (angka >= 20 && angka < 100) { let p = Math.floor(angka / 10); let s = angka % 10; if (s === 0) return puluhan[p]; return satuan[s] + " و " + puluhan[p]; }
            if (angka === 100) return "مائة";
            if (angka > 100 && angka < 1000) { const ratusan = ["", "مائة", "مائتان", "ثلاثمائة", "أربعمائة", "خمسمائة", "ستمائة", "سبعمائة", "ثمانمائة", "تسعمائة"]; let r = Math.floor(angka / 100); let sisa = angka % 100; if (sisa === 0) return ratusan[r]; return ratusan[r] + " و " + terbilangArab(sisa); }
            return angka.toString();
        }

        function predikatArab(huruf) {
            let h = (huruf||'').toUpperCase();
            if(h==='A') return 'ممتاز'; if(h==='B') return 'جيد'; if(h==='C') return 'كافي'; if(h==='D') return 'ناقص'; return '-';
        }

        const kamusArab = { 
            "AKHLAQ": "أخلاق", "AQIDAH": "عقيدة", "PERUKUNAN": "فروكونان", "YASIN": "يس", "ASAUL MUTTAQIN": "أصول المتقين", 
            "KHATH": "خط", "IMLA'": "إملاء", "IMLA": "إملاء", "JUZ'AMMA": "جزء عم", "JUZ 'AMMA": "جزء عم", "TAJWID": "تجويد", 
            "BAHASA DAERAH": "اللغة المحلية", "BAHASA ARAB": "لغة عربية", "SULLAM": "سلم", "FIQIH": "فقه", 
            "WUDUK": "وضوء", "TAYAMUM": "تيمم", "SHOLAT SUBUH": "صلاة صبح", "SHOLAT JENAZAH": "صلاة الجنازة", "DZIKIR": "ذكر", "TAHLIL": "تهليل",
            "AQOID": "عقائد", "KHOLASOH": "خلاصة", "HADIST": "حديث", "DO'A": "دعاء", "NAHWU": "نحو", "SORROF": "صرف", "SHOROF": "صرف", 
            "I'ROB": "إعراب", "I'LAL": "إعلال", "JAWAHIR": "جواهر", "MAQSUD": "مقصود", "TAFSIR": "تفسير", "TA'LIM": "تعليم", 
            "USUL": "أصول", "BIDAYAH": "بداية", "IBAD. USUL": "أصول العبادة",
            "MEMBACA ALQUR'ANUL KARIM": "القرآن الكريم", "MEMBACA KITAB": "قراءة الكتاب"
        };

        function toArabicNumeral(str) { return str.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]); }

        // =========================================================
        // MESIN RENDER KERTAS RAPOR (DYNAMIC DATA)
        // =========================================================
        function previewRapor() {
            const kelas = document.getElementById('raporKelas').value;
            const nis = document.getElementById('raporSantri').value;
            if(!kelas || !nis) return Swal.fire('Perhatian', 'Pilih kelas dan nama santri terlebih dahulu.', 'warning');

            showLoading(true);
            const fdNilai = new URLSearchParams(); fdNilai.append('action', 'getDataNilai'); fdNilai.append('kelas', kelas);
            const fdRank = new URLSearchParams(); fdRank.append('action', 'getRankingKelas'); fdRank.append('kelas', kelas);
            const fdSet = new URLSearchParams(); fdSet.append('action', 'getPengaturan'); fdSet.append('kelas', kelas);

            Promise.all([
                fetch(GAS_URL, {method:'POST', body:fdNilai}).then(r=>r.json()),
                fetch(GAS_URL, {method:'POST', body:fdRank}).then(r=>r.json()),
                fetch(GAS_URL, {method:'POST', body:fdSet}).then(r=>r.json())
            ]).then(([resNilai, resRank, resSet]) => {
                showLoading(false);
                const santriInfo = GLOBAL_DATA_SANTRI.find(x => x.nis == nis);
                let rowNilai = null;
                if(resNilai.status === 'success' && resNilai.data) {
                    rowNilai = resNilai.data.slice().reverse().find(r => r[0].toString().replace(/'/g,'').trim() == nis.trim());
                }
                if(!rowNilai) return Swal.fire('Data Kosong', 'Belum ada input nilai untuk santri ini di database.', 'info');

                let rank = '-';
                if(resRank.status === 'success' && resRank.data) {
                    let rData = resRank.data.find(x => x.nis.toString().trim() == nis.trim());
                    if(rData) rank = rData.rank;
                }
                
                // Ambil Data Pengaturan
                let pengaturan = { umum: {}, detail: {} };
                if(resSet.status === 'success') pengaturan = resSet;

                renderKertasRapor(kelas, santriInfo, resNilai.headers, rowNilai, rank, pengaturan);
            }).catch(err => { showLoading(false); Swal.fire('Error', 'Gagal memuat data rapor dari server.', 'error'); });
        }

       function renderKertasRapor(kelas, info, headers, nilaiRow, rank, pengaturan) {
            document.getElementById('wadahKertasRapor').classList.remove('hidden');
            document.getElementById('btnExportRapor').classList.remove('hidden');
            
            let setUmum = pengaturan.umum || {};
            
            // JURUS ANTI-GAGAL BACA NIS (Mengatasi perbedaan angka 005 dan 5)
            let nisDicari = info.nis.toString().replace(/'/g, "").trim();
            let setDetail = {akhlaq:'-', kerajinan:'-', disiplin:'-', rapi:'-', sakit:'-', izin:'-', alpa:'-', catatan:'', keputusan:''};
            
            if (pengaturan.detail) {
                for (let k in pengaturan.detail) {
                    if (k.toString() === nisDicari || parseInt(k) === parseInt(nisDicari)) {
                        setDetail = pengaturan.detail[k];
                        break;
                    }
                }
            }

           

            let barisIndo = ''; let barisArab = ''; 
            let total = 0, rata = 0;

            const katPraktek = ["WUDUK", "TAYAMUM", "SHOLAT SUBUH", "SHOLAT JENAZAH", "DZIKIR", "TAHLIL"];
            const katMembaca = ["MEMBACA ALQUR'ANUL KARIM", "MEMBACA KITAB"];
            let mapelTertulis = [], mapelPraktek = [], mapelMembaca = [];

            if (kelas.includes('TK')) {
                 total = nilaiRow[4] || 0; rata = nilaiRow[5] || 0;
                 let dataTK = [{m: nilaiRow[6]||'-', n: nilaiRow[7]||0}, {m: nilaiRow[8]||'-', n: nilaiRow[9]||0}, {m: nilaiRow[10]||'-', n: nilaiRow[11]||0}];
                 dataTK.forEach(x => { if(x.m !== '-') mapelTertulis.push({nama: x.m, nilai: x.n}); });
            } else {
                 total = nilaiRow[3] || 0; rata = nilaiRow[4] || 0;
                 for(let i = 5; i < headers.length; i++) {
                      let obj = { nama: headers[i], nilai: nilaiRow[i] !== "" ? parseFloat(nilaiRow[i]) : 0 };
                      let upper = obj.nama.toUpperCase();
                      if(katPraktek.includes(upper)) mapelPraktek.push(obj);
                      else if(katMembaca.includes(upper)) mapelMembaca.push(obj);
                      else mapelTertulis.push(obj);
                 }
            }

            function buildRow(no, item) {
                let hIndo = terbilang(item.nilai); let hArab = terbilangArab(item.nilai);
                let mArab = kamusArab[item.nama.toUpperCase()] || item.nama;
                
                barisIndo += `<tr style="height: 24px;">
                    <td class="border border-black px-1 text-center align-middle">${no}</td>
                    <td class="border border-black px-1.5 font-semibold align-middle truncate">${item.nama}</td>
                   <!-- Tambahkan text-[12px] atau text-[14px] -->
<td class="border border-black px-1 text-center font-bold align-middle text-[12px]">${item.nilai}</td>
                    <td class="border border-black px-1.5 text-[9px] uppercase align-middle truncate">${hIndo}</td>
                </tr>`;
				
				
				 // nomor dan mata pelajaran
                
                barisArab += `<tr style="height: 24px;">
                    <td class="border border-black px-1.5 text-center text-[18px] font-bold align-middle truncate" dir="rtl" style="font-family: 'Traditional Arabic', serif;">${hArab}</td>
                    <td class="border border-black px-1 text-center font-bold align-middle">${toArabicNumeral(item.nilai)}</td>
                    <td class="border border-black px-2 text-right font-bold text-[18px] align-middle truncate" dir="rtl" style="font-family: 'Traditional Arabic', serif;">${mArab}</td>
                   <!-- Tambahkan text-[12px] atau lebih besar -->
<td class="border border-black px-1 text-center align-middle text-[18px]">${toArabicNumeral(no)}</td>
                </tr>`;
            }

            function buildHeader(abjadIndo, judulIndo, abjadArab, judulArab) {
                barisIndo += `<tr style="height: 24px;" class="font-bold"><td class="border border-black px-1 text-center">${abjadIndo}</td><td class="border border-black px-1.5" colspan="3">${judulIndo}</td></tr>`;
                
                // Perubahan di sini: Menggunakan colspan="3" agar los seperti sebelah kiri
                barisArab += `<tr style="height: 24px;" class="font-bold"><td class="border border-black px-2 text-right text-[14px]" colspan="3" dir="rtl" style="font-family: 'Traditional Arabic', serif;">${judulArab}</td><td class="border border-black px-1 text-center">${abjadArab}</td></tr>`;
            }

            if(mapelTertulis.length > 0) { buildHeader('A', 'Tertulis', 'أ', ''); mapelTertulis.forEach((m, idx) => buildRow(idx+1, m)); }
            if(mapelPraktek.length > 0) { buildHeader('B', 'Praktek', 'ب', ''); mapelPraktek.forEach((m, idx) => buildRow(idx+1, m)); }
            if(mapelMembaca.length > 0) { buildHeader('C', 'Membaca', 'ت', ''); mapelMembaca.forEach((m, idx) => buildRow(idx+1, m)); }

            const nextClass = kelas.includes('TK') ? 'TK Lanjutan' : (kelas.includes('VI') ? 'Lulus / Sanawiyah' : 'Kelas Berikutnya');
			
			// Logika Deteksi Semester Genap / Ganjil
         let isGenap = (setUmum.semester || '').toLowerCase().includes('genap');
         let teksKeputusan = isGenap 
             ? `Berdasarkan hasil yang dicapai pada Semester 1 & 2<br>Santri, maka dinyatakan :<br><span class="font-bold">${setDetail.keputusan || `Naik Ke ${nextClass}`}</span>`
             : `<div class="text-center mt-4 text-gray-500 font-normal italic">- Hanya diisi pada akhir tahun pelajaran (Genap) -</div>`;
            
            document.getElementById('kertasRapor').innerHTML = `
               <div class="text-center pb-1 relative">
                   <div class="absolute left-4 top-3">
     <img src="asset/logo.png.png" class="h-20 w-20 object-contain" alt="Logo Madrasah">
</div>
                    
                    <h1 class="text-[36px] font-bold leading-none mb-0" style="font-family: 'Traditional Arabic', serif; color: #000;">مدرسة دار السلام</h1>
    <h2 class="text-[16px] font-black uppercase tracking-widest text-black mt-1 mb-0">Madrasah Darussalam</h2>
    <p class="text-[11px] font-bold text-black uppercase tracking-widest leading-tight mb-0.5">Batukessel Bandang Laok Kokop Bangkalan</p>
    <p class="text-[9px] text-gray-800 font-medium leading-tight">E-mail: batukessel@gmail.com | Website: www.madasa.ponpes.id</p>
</div>
                
                <div class="w-full border-b-[3px] border-black mt-2 mb-[2px]"></div>
                <div class="w-full border-b border-black mb-5"></div>
              
                
                <h2 class="text-center text-sm font-bold uppercase mb-4 tracking-wider text-black underline underline-offset-2">LAPORAN HASIL BELAJAR SANTRI</h2>
                
                <div class="flex justify-between items-start mb-3 text-[12px] font-bold text-black">
    <div class="w-[48%]">
        <table class="w-full">
            <tr><td class="w-24 py-0.5">Nama Santri</td><td class="w-2 py-0.5">:</td><td class="py-0.5 uppercase">${info.nama}</td></tr>
            <tr><td class="py-0.5">No. Induk</td><td class="py-0.5">:</td><td class="py-0.5">${info.nis}</td></tr>
            <tr><td class="py-0.5">Alamat</td><td class="py-0.5">:</td><td class="py-0.5">${info.alamat || '-'}</td></tr>
        </table>
    </div>
    <div class="w-[48%]">
        <table class="w-full">
            <tr><td class="w-28 py-0.5">Kelas</td><td class="w-2 py-0.5">:</td><td class="py-0.5">${kelas}</td></tr>
            <tr><td class="py-0.5">Semester</td><td class="py-0.5">:</td><td class="py-0.5">${setUmum.semester || '-'}</td></tr>
            <tr><td class="py-0.5">Tahun Pelajaran</td><td class="py-0.5">:</td><td class="py-0.5">${setUmum.tahun || '-'}</td></tr>
        </table>
    </div>
</div>

                <div class="grid grid-cols-2 gap-2 mb-2 items-start text-black">
                    <table class="w-full text-left border-collapse border-2 border-black text-[10px]" style="table-layout: fixed;">
                        <thead>
                            <tr style="height: 24px;">
                                <th rowspan="2" class="border border-black text-center align-middle" style="width: 6%;"></th>
                                <th rowspan="2" class="border border-black text-center align-middle" style="width: 38%;">Mata Pelajaran</th>
                                <th colspan="2" class="border border-black text-center align-middle" style="width: 56%;">Hasil Tes</th>
                            </tr>
                            <tr style="height: 24px;">
                                <th class="border border-black text-center align-middle" style="width: 14%;">Angka</th>
                                <th class="border border-black text-center align-middle" style="width: 42%;">Huruf</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${barisIndo}
                            <tr style="height: 24px;" class="font-bold border-t-2 border-black">
                                <td colspan="2" class="border border-black px-1.5 uppercase">JUMLAH</td>
                                <td class="border border-black px-1 text-center">${total}</td>
                                <td class="border border-black px-1.5 text-[9px] uppercase leading-tight">${terbilang(total)}</td>
                            </tr>
                            <tr style="height: 24px;" class="font-bold">
                                <td colspan="2" class="border border-black px-1.5 uppercase border-b-2 border-black">RANGKING</td>
                                <td class="border border-black px-1 text-center border-b-2 border-black">${rank}</td>
                                <td class="border border-black px-1.5 border-b-2 border-black"></td>
                            </tr>
                        </tbody>
                    </table>

                    <table class="w-full text-right border-collapse border-2 border-black text-[10px]" style="table-layout: fixed;">
                        <thead>
                            <tr style="height: 24px;">
                                <th colspan="2" class="border border-black text-center align-middle font-bold text-[14px]" style="width: 56%; font-family: 'Traditional Arabic', serif;">الدرجات المكتسبة</th>
                                <th rowspan="2" class="border border-black text-center align-middle font-bold text-[14px]" style="width: 38%; font-family: 'Traditional Arabic', serif;">المواد الدراسية</th>
                                <th rowspan="2" class="border border-black text-center align-middle" style="width: 6%;"></th>
                            </tr>
                            <tr style="height: 24px;">
                                <th class="border border-black text-center align-middle font-bold text-[14px]" style="width: 42%; font-family: 'Traditional Arabic', serif;">كتابة</th>

        function exportRaporPDF() {
            const elemen = document.getElementById('kertasRapor');
            const nis = document.getElementById('raporSantri').value;
            const info = GLOBAL_DATA_SANTRI.find(x => x.nis == nis);
            const nama = info ? info.nama.replace(/\s+/g, '_') : 'Santri';

           const opt = { margin: 0.3, filename: `Rapor_${nama}_${nis}.pdf`, image: { type: 'jpeg', quality: 1 }, html2canvas: { scale: 3, useCORS: true }, jsPDF: { unit: 'in', format: [8.27, 13], orientation: 'portrait' } };
            showLoading(true);
            html2pdf().set(opt).from(elemen).save().then(() => {
                showLoading(false); Swal.fire({ icon: 'success', title: 'Berhasil', text: 'Rapor berhasil diunduh ke PDF.', timer: 2000, showConfirmButton: false });
            });
        }
